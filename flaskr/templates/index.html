<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>ランダムダーツ</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='sanitize.css') }}">
    <!-- <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet"> -->
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
</head>
<body>
    <header class="top-bar">
        <a class="utility-button about-button" href="{{ url_for('about') }}">このアプリについて</a>
        {% if g.user %}
            <div class="account-panel">
                <span>{{ g.user.username }} でログイン中</span>
                <form action="{{ url_for('auth.logout') }}" method="POST">
                    <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
                    <button class="utility-button logout-button" type="submit">ログアウト</button>
                </form>
            </div>
        {% else %}
            <div class="auth-panel">
                <a class="utility-button auth-button" href="{{ url_for('auth.auth_page') }}">認証・ログイン</a>
                <span class="auth-note">認証すると結果が残ります</span>
            </div>
        {% endif %}
    </header>

    <h1>ランダムダーツ</h1>
    <p>
        ダーツ練習アプリです<br>
        アプリの説明と認証は画面上部から確認できます
    </p>
    <br>

    <nav class="menu" aria-label="メインメニュー">
        <a class="menu-button" href="{{ url_for('next_page') }}">Normal mode</a>
        <a class="menu-button" href="{{ url_for('advanced_page') }}">Advanced mode</a>
        <a class="menu-button" href="{{ url_for('cricket_page') }}">Cricket mode</a>
    </nav>



    <div class="how">
        <a href="https://www.dartslive.com/jp/beginner/throwing/" rel="noopener noreferrer">
            ダーツの投げ方はこちら
        </a>
    </div>
    

</body>

</html>
