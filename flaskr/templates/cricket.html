<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>クリケット練習</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='secondstyle.css') }}">
</head>
<body class="{% if cricket_number == 'bull' %}bull-mode{% endif %}">
    <nav class="practice-nav" aria-label="ページ移動">
        <a href="{{ url_for('result') }}">結果を見る</a>
        <a href="{{ url_for('index') }}">トップへ</a>
    </nav>

    <div class="content" data-target-number="{{ cricket_number }}">
        <p class="practice-label cricket-label">Cricket Practice</p>
        <h1>
            クリケットナンバー<br>
            <strong class="{% if cricket_number == 'bull' %}bull-text{% endif %}">
                {{ cricket_number }}
            </strong>
            を狙ってください！
        </h1>
    </div>

    <div class="form">
        <form action="{{ url_for('cricket_success') }}" method="POST">
            <input type="hidden" name="target_token" value="{{ target_token }}">
            <div class="selection">
                <label for="cricket-count">3投中の成功回数</label>
                <select id="cricket-count" name="count" required>
                    <option value="" selected disabled>成功回数を選択！</option>
                    <option value="0">0</option>
                    <option value="1">1</option>
                    <option value="2">2</option>
                    <option value="3">3</option>
                </select>
            </div>
            <div class="bottom-button">
                <button type="submit" class="btn btn-primary">Next Round</button>
            </div>
        </form>
    </div>
</body>
</html>
