<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>ランダムダーツ</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='secondstyle.css') }}">
</head>

<body class="{% if random_number == 'bull' %}bull-mode{% endif %}">

    <nav class="practice-nav" aria-label="ページ移動">
        <a href="{{ url_for('result') }}">結果を見る</a>
        <a href="{{ url_for('index') }}">トップへ</a>
    </nav>

    
    <div class="content">
        <h1>
            このラウンドでは<br>
            <strong class="{% if random_number == 'bull' %}bull-text{% endif %}">
                {{ random_number }}
            </strong>
            を狙ってください！
        </h1>
    </div>

    <div class="form">
    <form action="{{ url_for('success') }}" method="POST">
        <input type="hidden" name="target_token" value="{{ target_token }}">
        <fieldset class="score-buttons">
            <legend>3投中の成功本数</legend>
            <button type="submit" name="count" value="0">0</button>
            <button type="submit" name="count" value="1">1</button>
            <button type="submit" name="count" value="2">2</button>
            <button type="submit" name="count" value="3">3</button>
        </fieldset>
    </form>
    </div>


</body>
</html>
