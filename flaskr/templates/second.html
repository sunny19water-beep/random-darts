<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>ランダムダーツ</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='secondstyle.css') }}">
</head>

<body class="{% if random_number == 'bull' %}bull-mode{% endif %}">

    
    <div class="content">
        <h1>
            このラウンドでは<br>
            <strong class="{% if random_number == 'bull' %}bull-text{% endif %}">
                {{ random_number }}
            </strong>
            を狙ってください！
        </h1>
    </div>

    <div class="form">
    <form action="{{ url_for('success') }}" method="POST">
        <div class="selection">
        <label for="normal-count">3投中の成功回数</label>
        <select id="normal-count" name="count" required>
            <option value="" selected disabled>成功回数を選択！</option>
            <option value="0">  0  </option>
            <option value="1">  1  </option>
            <option value="2">  2  </option>
            <option value="3">  3  </option>
        </select>
        </div>
        <div class="bottom-button">
            <button type="submit" class="btn btn-primary">
                Next Round
            </button>
        </div>
    </form>
    </div>


</body>
</html>
