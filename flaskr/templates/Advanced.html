<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>上級者向けランダムダーツ</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='sanitize.css') }}">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='Advanced.css') }}">
</head>
<body>

    <div class="content">
        <h1>
            このラウンドでは<br>
            <strong>{{random_number}}</strong>の

            <strong>
                {{ bed_number }}
            </strong>
            を狙ってください！

        </h1>
        
    </div>

    <form action="/Advanced_success" method="POST">
        <div class="selection">
        <select name="count">
            <option value="">成功回数を記入！</option>
            <option value="0">  0  </option>
            <option value="1">  1  </option>
            <option value="2">  2  </option>
            <option value="3">  3  </option>
        </select>
        </div>
    
    
    </form>
    
    <div class="bottom-button">
        
        <a class="btn btn-primary" href="/Advanced">Next Round</a>
    </div>

</body>
</html>
